:root{

 --gold:#c9a84c;--gold-l:#e0c76e;--gold-dim:rgba(201,168,76,.15);--gold-bdr:rgba(201,168,76,.3);
 --white:#fff;--bg:#f4f1eb;--card:#fff;--text:#1a1a2e;--muted:#6b7280;--text-l:#9ca3af;

 --sh:0 4px 16px rgba(13,39,68,.08);--sh-lg:0 8px 32px rgba(13,39,68,.12);
 --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
 --serif:Georgia,'Times New Roman',serif;

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.5;

button,a{touch-action:manipulation;cursor:pointer;-webkit-tap-highlight-color:transparent}
input,select,textarea{font-family:var(--sans);font-size:16px;touch-action:manipulation;-webkit-tap-highlight-color:transparent}

#login-screen{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;
 align-items:center;justify-content:center;z-index:200;padding:20px}
.login-card{background:var(--navy-l);border:2px solid var(--gold-bdr);border-radius:var(--r-lg);
 padding:32px 24px;width:100%;max-width:320px;text-align:center;box-shadow:var(--sh-lg)}
.login-brand{font-family:var(--serif);font-size:28px;font-weight:700;color:#fff;margin-bottom:4px}
.login-brand em{color:var(--gold);font-style:italic}
.login-sub{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:24px}
.login-field{text-align:left;margin-bottom:16px}
.login-field label{display:block;font-size:12px;color:rgba(255,255,255,.6);margin-bottom:4px;font-weight:500}
.login-field input{width:100%;padding:12px;background:rgba(255,255,255,.08);border:1px solid var(--gold-bdr);
 border-radius:var(--r-sm);color:#fff;font-size:18px;text-align:center;letter-spacing:4px}
.login-field input:focus{outline:none;border-color:var(--gold)}
.login-btn{width:100%;padding:14px;background:var(--gold);color:var(--navy);border:none;border-radius:var(--r-sm);
 font-size:16px;font-weight:700;cursor:pointer;margin-top:8px}
.login-btn:active{background:var(--gold-l)}
.login-err{color:#f87171;font-size:13px;margin-top:12px;display:none}
#topbar{position:fixed;top:0;left:0;right:0;height:var(--top-h);background:var(--navy);
 display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:100;
 border-bottom:2px solid var(--gold)}
.tb-brand{font-family:var(--serif);font-size:18px;font-weight:700;color:#fff;white-space:nowrap}
.tb-brand em{color:var(--gold);font-style:italic}
.tb-title{color:var(--gold);font-size:14px;font-weight:600;letter-spacing:.04em}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-user{font-size:12px;color:rgba(255,255,255,.7)}
.tb-btn{padding:6px 12px;background:transparent;border:1px solid var(--gold-bdr);border-radius:var(--r-sm);
 color:var(--gold);font-size:12px;font-weight:600;cursor:pointer}
.tb-btn:active{background:var(--gold-dim)}
#content{position:fixed;top:var(--top-h);left:0;right:0;bottom:var(--tab-h);overflow-y:auto;
 -webkit-overflow-scrolling:touch;padding:16px}
#bottom-tabs{position:fixed;bottom:0;left:0;right:0;height:var(--tab-h);background:var(--navy);
 display:flex;align-items:center;justify-content:space-around;z-index:100;
 border-top:2px solid var(--gold-bdr);padding-bottom:env(safe-area-inset-bottom)}
.tab-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;
 background:none;border:none;color:rgba(255,255,255,.5);font-size:10px;padding:4px 8px;
 cursor:pointer;transition:color .15s;min-width:0;flex:1}
.tab-btn.on{color:var(--gold)}
.tab-icon{font-size:20px;line-height:1.2}
.module{display:none}.module.on{display:block}
.container{max-width:600px;margin:0 auto}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:16px;margin-bottom:16px}
.card-h-gold{font-family:var(--serif);font-size:16px;font-weight:700;color:var(--gold);
 margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--gold-bdr)}
.fg2{margin-bottom:12px}
.fg2 label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px}
.input,.select,.textarea{width:100%;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:var(--r-sm);
 background:#fff;color:var(--text);transition:border-color .15s}
.input:focus,.select:focus,.textarea:focus{outline:none;border-color:var(--gold)}
.textarea{min-height:60px;resize:vertical}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 20px;border-radius:var(--r-sm);
 font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .15s;text-align:center}
.btn:active{transform:scale(.97)}
.btn-navy{background:var(--navy);color:var(--gold)}

.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:var(--r-sm)}
.btn-block{width:100%;display:block}
.tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.tab-pill{padding:8px 16px;background:var(--card);border:1.5px solid #e5e7eb;border-radius:20px;
 font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s}
.tab-pill.on{background:var(--navy);color:var(--gold);border-color:var(--navy)}
.counter{display:flex;align-items:center;justify-content:center;gap:16px;margin:12px 0}
.c-btn{width:48px;height:48px;border-radius:50%;border:2px solid var(--gold-bdr);background:var(--card);
 font-size:24px;font-weight:700;color:var(--navy);cursor:pointer;display:flex;align-items:center;justify-content:center}
.c-btn:active{background:var(--gold-dim)}
.c-mid{text-align:center}
.c-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.c-val{font-size:28px;font-weight:700;color:var(--navy)}
.price-display{text-align:center;padding:16px;background:var(--navy);border-radius:var(--r-sm);margin:12px 0}

.price-display .sub{font-size:12px;color:rgba(255,255,255,.5);margin-top:4px}
.summary{background:var(--bg);border-radius:var(--r-sm);padding:12px;margin:12px 0}
.summary-row{display:flex;justify-content:space-between;padding:6px 0;font-size:14px}
.summary-row.total{font-weight:700;color:var(--navy);border-top:2px solid var(--gold-bdr);padding-top:10px;margin-top:6px}
.sl-row{display:flex;align-items:center;gap:8px;padding:6px 0}
.sl-label{font-size:13px;font-weight:600;min-width:120px;color:var(--navy)}
.sl-range{flex:1;accent-color:var(--gold)}
.sl-pct{font-size:13px;font-weight:600;min-width:40px;text-align:right;color:var(--gold)}

.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:8px;opacity:.5}
.exp-item{display:flex;align-items:center;gap:12px;padding:12px;background:var(--card);
 border-radius:var(--r-sm);box-shadow:var(--sh);margin-bottom:8px;cursor:pointer;transition:box-shadow .15s}
.exp-item:active{box-shadow:var(--sh-lg)}
.exp-thumb{width:48px;height:48px;border-radius:6px;object-fit:cover;flex-shrink:0;background:#f3f4f6}
.exp-info{flex:1;min-width:0}

.exp-cat{font-size:12px;color:var(--muted)}
.exp-amt{font-size:16px;font-weight:700;color:var(--navy);white-space:nowrap}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.b-approved{background:var(--green-bg);color:var(--green)}
.sched-head{display:flex;gap:4px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px;-webkit-overflow-scrolling:touch}

function chefGetPrice(service,guests){
 if(service==='breakfast'){var b=CHEF_PRICING.breakfast.find(function(x){return x.g===guests});return b?b.price:0}
 if(service==='floating'){return CHEF_PRICING.floating.fixedPrice}
 if(service==='thai'){var t=CHEF_PRICING.thai.find(function(x){return guests>=x.min&&guests<=x.max});return t?t.price:0}
 if(service==='bbq'){var q=CHEF_PRICING.bbq.find(function(x){return guests>=x.min&&guests<=x.max});return q?q.fee:0}
 return 0;
}
function chefGetDefaultShares(tab){
 var g=chefState.services[tab]?chefState.services[tab].guests:2;var laborPct;
 if(tab==='breakfast'){if(g<=3)laborPct=30;else if(g<=6)laborPct=35;else if(g<=10)laborPct=38;else laborPct=42;return{labor:laborPct,ingredients:28,commission:5,profit:27,buffer:100-laborPct-28-5-27}}
 if(tab==='floating'){return{labor:30,ingredients:28,commission:5,profit:27,buffer:10}}
 if(tab==='thai'){if(g<=3)laborPct=30;else if(g<=6)laborPct=35;else if(g<=9)laborPct=38;else laborPct=42;return{labor:laborPct,ingredients:33,commission:5,profit:17,buffer:100-laborPct-33-5-17}}
 if(tab==='bbq'){if(g<=3)laborPct=30;else if(g<=6)laborPct=35;else if(g<=9)laborPct=38;else laborPct=42;return{labor:laborPct,ingredients:0,commission:5,profit:40,buffer:100-laborPct-0-5-40}}
 return{labor:30,ingredients:20,commission:20,profit:15,buffer:15};
}
function chefInitServices(){
 var saved=ld('chef_calcs');var svcs=['breakfast','floating','thai','bbq','custom'];
 if(saved){chefState.saved=saved}
 for(var i=0;i<svcs.length;i++){
 if(!chefState.services[svcs[i]]){
 var s=(chefState.saved&&chefState.saved[svcs[i]])||{};var def=chefGetDefaultShares(svcs[i]);
 chefState.services[svcs[i]]={guests:s.guests||(svcs[i]==='breakfast'?2:svcs[i]==='thai'?4:svcs[i]==='bbq'?4:2),ingredientCost:s.ingredientCost||0,manualPrice:s.manualPrice||0,shares:s.shares||{0:def.labor,1:def.ingredients,2:def.commission,3:def.profit,4:def.buffer}};
 }
 }
}

function chefGuests(d){

function chefSlider(idx,val){
 var s=chefState.services[chefState.tab];val=parseInt(val);s.shares[idx]=val;
 var others=[];for(var i=0;i<5;i++){if(i!==idx)others.push(i)}
 var othersSum=0;for(var i=0;i<others.length;i++){othersSum+=(s.shares[others[i]]||0)}
 var remaining=100-val;
 if(othersSum===0){var each=Math.floor(remaining/others.length);for(var i=0;i<others.length;i++){s.shares[others[i]]=each}}
 else{for(var i=0;i<others.length;i++){s.shares[others[i]]=Math.round(remaining*(s.shares[others[i]]||0)/othersSum)}}
 renderChefPanel();
}

 if(!villa){alert('Select a villa first');return}
 var basePrice=villa[cleaningState.mode]||villa.co;
 var garbage=villa.garbage||0;
 var totalPrice=basePrice+garbage;
 var saved=ld('clean_calcs')||{};
 if(!saved[cleaningState.villa])saved[cleaningState.villa]={};
 var def=cleanGetDefaultShares(cleaningState.mode);
 var d=saved[cleaningState.villa][cleaningState.mode]||{extraCost:0,shares:{0:def.labor,1:def.supplies,2:def.commission,3:def.profit,4:def.buffer}};
 var totalCost=d.extraCost+garbage;
 if(villa.laundry&&villa.laundryCost)totalCost+=villa.laundryCost;
 var profit=totalPrice-totalCost;
 var commission=Math.round(totalPrice*0.10);
 var netProfit=profit-commission;
 if(!saved[cleaningState.villa]._jobs)saved[cleaningState.villa]._jobs=[];
 saved[cleaningState.villa]._jobs.push({
  date:today(),
  villa:cleaningState.villa,

  type:cleaningState.mode,
  amount:totalPrice,
  extraCost:d.extraCost,
  commission:commission,
  profit:netProfit,
  shares:d.shares,
  by:CUR.u,
  byName:CUR.name
 });
 sv('clean_calcs',saved);
 alert('Saved!');
}

 canvas.width=w;canvas.height=h;
 var ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,w,h);
 uploadPhotoData=canvas.toDataURL('image/jpeg',0.7);
 document.getElementById('exp-preview').innerHTML='<img class="exp-thumb" src="'+uploadPhotoData+'" style="width:100%;max-width:300px;height:auto">';

 };

}

 });

function renderInvoice(){
 var c=document.getElementById('invoice-content');
 if(!c)return;
 var h='<div class="card"><div class="card-h-gold">Invoice Generator</div>';
 h+='<div class="fg2"><label>Client</label><select class="select" id="inv-client" onchange="invSetClient(this.value)">';
 h+='<option value="">Select client...</option>';
 for(var i=0;i<INV_CLIENTS.length;i++){
  h+='<option value="'+INV_CLIENTS[i].id+'"'+(invState.client===INV_CLIENTS[i].id?' selected':'')+'>'+INV_CLIENTS[i].label+'</option>';
 }
 h+='</select></div>';

 if(invState.client){
  var defMode=invGetDefaultMode(invState.client);
  if(!invState.mode)invState.mode=defMode;
  h+='<div class="fg2"><label>Billing Type</label><select class="select" id="inv-mode" onchange="invSetMode(this.value)">';
  h+='<option value="semi"'+(invState.mode==='semi'?' selected':'')+'>Semi-Monthly</option>';
  h+='<option value="monthly"'+(invState.mode==='monthly'?' selected':'')+'>Monthly</option>';
  h+='<option value="perjob"'+(invState.mode==='perjob'?' selected':'')+'>Per Job</option>';
  h+='</select></div>';
 }

 if(invState.client&&invState.mode!=='perjob'){
  h+='<div class="fg2"><label>Month</label><input class="input" type="month" id="inv-month" value="'+invState.month+'" onchange="invState.month=this.value;renderInvoice()"></div>';
 }
 if(invState.client&&invState.mode==='semi'){
  h+='<div class="fg2"><label>Billing Period</label><select class="select" id="inv-period" onchange="invState.period=this.value;renderInvoice()">';
  h+='<option value="">Select period...</option>';
  h+='<option value="1"'+(invState.period==='1'?' selected':'')+'>1st - 15th (Due 15th)</option>';
  h+='<option value="2"'+(invState.period==='2'?' selected':'')+'>16th - 30th (Due 30th)</option>';
  h+='</select></div>';
 }
 if(invState.client==='laurent'){
  h+='<div class="fg2"><label>Laurent Villa</label><select class="select" id="inv-laurent-villa" onchange="invState.laurentVilla=this.value;renderInvoice()">';
  h+='<option value="">Select villa...</option>';
  for(var vi=0;vi<client.subVillas.length;vi++){
   h+='<option value="'+client.subVillas[vi].id+'"'+(invState.laurentVilla===client.subVillas[vi].id?' selected':'')+'>'+client.subVillas[vi].label+'</option>';
  }
  h+='</select></div>';
 }
 h+='</div>';

 if(!invState.client){
  h+='<div class="empty"><div class="empty-icon">&#128196;</div><div>Select a client to generate invoice</div></div>';
  c.innerHTML=h;return;
 }

 var client=INV_CLIENTS.find(function(x){return x.id===invState.client});

 if(invState.mode==='perjob'){
  h+=invRenderPerJob(client);
  c.innerHTML=h;return;
 }

 if(!invState.month){
  h+='<div class="empty"><div class="empty-icon">&#128196;</div><div>Select month to generate invoice</div></div>';
  c.innerHTML=h;return;
 }
 if(invState.mode==='semi'&&!invState.period){
  h+='<div class="empty"><div class="empty-icon">&#128196;</div><div>Select billing period</div></div>';
  c.innerHTML=h;return;
 }
 if(invState.client==='laurent'&&!invState.laurentVilla){
  h+='<div class="empty"><div class="empty-icon">&#128196;</div><div>Select Laurent villa</div></div>';
  c.innerHTML=h;return;
 }

 var dayFrom,dayTo,periodLabel,dueDate;
 if(invState.mode==='semi'){
  if(invState.period==='1'){dayFrom=1;dayTo=15;periodLabel='1-15 '+invState.month;dueDate='15 '+invState.month}
  else{dayFrom=16;dayTo=31;periodLabel='16-30 '+invState.month;dueDate='30 '+invState.month}
 }else{
  var yr=parseInt(invState.month.split('-')[0]);
  var mo=parseInt(invState.month.split('-')[1]);
  var nextMo=mo+1;var nextYr=yr;
  if(nextMo>12){nextMo=1;nextYr++}
  dueDate='1 '+['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][nextMo]+' '+nextYr;
  periodLabel=invState.month;
 }

 var jobs=invGetJobs(invState.month,dayFrom,dayTo);
 if(jobs.length===0){
  h+='<div class="empty"><div class="empty-icon">&#128196;</div><div>No jobs found for this period</div></div>';
  c.innerHTML=h;return;
 }

 var invKey=invState.mode==='semi'?invState.period:'';
 var invPrefix=client.prefix;
 var billToClient=client;
 if(invState.client==='laurent'&&invState.laurentVilla){
  var lv=client.subVillas.find(function(v){return v.id===invState.laurentVilla});
  if(lv){invPrefix=lv.invPrefix;billToClient={label:lv.company,addr:lv.attn+'\n'+lv.addr,wht:client.wht}}
 }
 var invNum=invGetNextNum(invPrefix,invKey);
 var invSuffix='';
 if(invState.mode==='semi')invSuffix=invState.period==='1'?'a':'b';
 var invNo=invPrefix+'-'+invState.month.slice(0,4)+'-'+invNum+invSuffix;
 var applyWht=billToClient.wht;

 h+=invRenderPreview(jobs,billToClient,invNo,periodLabel,dueDate,applyWht);
 c.innerHTML=h;
}

function invSetClient(cid){
 invState.client=cid;
 invState.mode=invGetDefaultMode(cid);
 invState.period='';
 invState.pjJobs=[];
 invState.laurentVilla='';
 renderInvoice();
}

function invSetMode(mode){
 invState.mode=mode;
 invState.period='';
 invState.pjJobs=[];
 renderInvoice();
}

function invRenderPerJob(client){
 var h='<div class="card" style="padding-bottom:120px"><div class="card-h-gold">Add Jobs</div>';
 h+='<div class="fg2"><label>Villa Name</label><input class="input" type="text" id="pj-villa" placeholder="e.g. Villa Chacha..."></div>';
 h+='<div class="fg2"><label>Service Type</label><select class="select" id="pj-service">';
 for(var i=0;i<INV_SERVICE_TYPES.length;i++){
  h+='<option value="'+INV_SERVICE_TYPES[i].id+'">'+INV_SERVICE_TYPES[i].label+'</option>';
 }
 h+='</select></div>';
 h+='<div class="fg2"><label>Date</label><input class="input" type="date" id="pj-date" value="'+new Date().toISOString().slice(0,10)+'"></div>';
 h+='<div class="fg2"><label>Amount (THB)</label><input class="input" type="number" id="pj-amount" value="0"></div>';
 h+='<button class="btn btn-navy btn-block" onclick="invAddPJ()">+ Add Job</button>';
 h+='</div>';
 return h;
}

function invAddPJ(){
 var villa=document.getElementById('pj-villa').value.trim();
 var service=document.getElementById('pj-service').value;
 var date=document.getElementById('pj-date').value;
 var amount=parseInt(document.getElementById('pj-amount').value)||0;
 if(!villa){alert('Enter villa name');return}
 if(!date){alert('Select a date');return}
 if(amount<=0){alert('Enter valid amount');return}
 var svcLabel='';
 for(var i=0;i<INV_SERVICE_TYPES.length;i++){if(INV_SERVICE_TYPES[i].id===service)svcLabel=INV_SERVICE_TYPES[i].label}
 invState.pjJobs.push({villa:villa,service:svcLabel,date:date,amount:amount});
 renderInvoice();
}

function invRemovePJ(idx){
 invState.pjJobs.splice(idx,1);
 renderInvoice();
}

function invPrint(){
 var el=document.getElementById('inv-preview');
 if(!el)return;
 var w=window.open('','_blank','width=800,height=600');
 w.document.write('<html><head><title></title>');
 w.document.write('<style>');

function invCopyWA(){
 var client=INV_CLIENTS.find(function(x){return x.id===invState.client});
 if(!client)return;
 var jobs=invState.mode==='perjob'?invState.pjJobs:invGetJobs(invState.month,
  invState.mode==='semi'?(invState.period==='1'?1:16):undefined,
  invState.mode==='semi'?(invState.period==='1'?15:31):undefined);
 var total=0;for(var i=0;i<jobs.length;i++){total+=jobs[i].amount}
 var applyWht=client.wht||(invState.mode==='perjob'&&(client.id==='adam'||client.id==='mps'));
 var whtAmt=applyWht?Math.round(total*0.03):0;
 var totalDue=total-whtAmt;
 var invPrefix=client.prefix;
 var billToLabel=client.label;
 if(invState.client==='laurent'&&invState.laurentVilla){
  var lv=client.subVillas.find(function(v){return v.id===invState.laurentVilla});
  if(lv){invPrefix=lv.invPrefix;billToLabel=lv.company}
 }
 var invNum=invGetNextNum(invState.mode==='perjob'?'PJ':invPrefix,invState.mode==='semi'?invState.period:'');
 var invSuffix=invState.mode==='semi'?(invState.period==='1'?'a':'b'):'';
 var invNo=(invState.mode==='perjob'?'PJ':invPrefix)+'-'+invState.month.slice(0,4)+'-'+invNum+invSuffix;
 var periodLabel=invState.mode==='perjob'?'Per Job Invoice':(invState.mode==='semi'?(invState.period==='1'?'1-15':'16-30')+' '+invState.month:invState.month);

 var txt='*INVOICE '+invNo+'*\n';
 txt+='VIDA GROUP SAMUI CO., LTD.\n';
 txt+='Period: '+periodLabel+'\n';
 txt+='Client: '+billToLabel+'\n\n';
 for(var i=0;i<jobs.length;i++){
  var j=jobs[i];
  txt+=fmtDate(j.date)+' | '+(j.villa||'-')+' | '+j.service+' | '+fmt(j.amount)+' THB\n';
 }
 txt+='\nSubtotal: '+fmt(total)+' THB\n';
 if(applyWht)txt+='WHT 3%: -'+fmt(whtAmt)+' THB\n';
 txt+='*Total Due: '+fmt(totalDue)+' THB*\n\n';
 txt+='Payment:\nKrungthai Bank\n982-3-93931-4\nMR. PHYO NYI NYI THET';

 if(navigator.clipboard){
  navigator.clipboard.writeText(txt).then(function(){alert('Invoice copied to clipboard!')});
 }else{
  var ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
  alert('Invoice copied to clipboard!');
 }
}

// ==================== P&L SUMMARY ====================
var pnlMonth=new Date().toISOString().slice(0,7);

function renderPnl(){
 var c=document.getElementById('pnl-content');
 if(!c)return;
 var isViewer=CUR.role==='viewer';
 var isDirector=CUR.role==='director';

 // Month selector
 var h='<div class="card"><div class="card-h-gold">P&L Summary</div>';
 h+='<div class="fg2"><label>Month</label><input class="input" type="month" id="pnl-month" value="'+pnlMonth+'" onchange="pnlMonth=this.value;renderPnl()"></div>';
 h+='</div>';

 // Calculate totals for selected month
 var expenses=ld('expenses')||[];
 var chefJobs=ld('chef_jobs')||[];
 var cleanCalcs=ld('clean_calcs')||{};
 var poolJobs=ld('pool_jobs')||[];

 var monthExp=expenses.filter(function(e){return e.at&&e.at.slice(0,7)===pnlMonth});
 var monthChef=chefJobs.filter(function(c){return c.date&&c.date.slice(0,7)===pnlMonth});
 var monthClean=[];
 for(var villaId in cleanCalcs){
  var villaData=cleanCalcs[villaId];
  if(villaData._jobs){
   for(var ji=0;ji<villaData._jobs.length;ji++){
    var j=villaData._jobs[ji];
    if(j.date&&j.date.slice(0,7)===pnlMonth)monthClean.push(j);
   }
  }
 }
 var monthPool=poolJobs.filter(function(p){return p.date&&p.date.slice(0,7)===pnlMonth});

 var totalExp=0;for(var i=0;i<monthExp.length;i++){totalExp+=monthExp[i].amt}
 var totalChef=0;for(var i=0;i<monthChef.length;i++){totalChef+=monthChef[i].profit||0}
 var totalClean=0;for(var i=0;i<monthClean.length;i++){totalClean+=monthClean[i].profit||0}
 var totalPool=0;for(var i=0;i<monthPool.length;i++){totalPool+=monthPool[i].profit||0}
 var revenue=totalChef+totalClean+totalPool;
 var profit=revenue-totalExp;

 // Summary cards
 h+='<div class="card"><div class="summary">';
 h+='<div class="summary-row"><span>Revenue</span><span style="color:#16a34a;font-weight:600">'+fmt(revenue)+' THB</span></div>';
 h+='<div class="summary-row"><span>Expenses</span><span style="color:#dc2626;font-weight:600">'+fmt(totalExp)+' THB</span></div>';
 h+='<div class="summary-row"><span>Profit</span><span style="color:'+(profit>=0?'#16a34a':'#dc2626')+';font-weight:700;font-size:16px">'+fmt(profit)+' THB</span></div>';
 h+='</div></div>';

 // Revenue breakdown
 h+='<div class="card"><div class="card-h">Revenue Breakdown</div>';
 h+='<div class="summary">';
 h+='<div class="summary-row"><span>Chef Profit</span><span>'+fmt(totalChef)+' THB</span></div>';
 h+='<div class="summary-row"><span>Cleaning Profit</span><span>'+fmt(totalClean)+' THB</span></div>';
 h+='<div class="summary-row"><span>Pool Profit</span><span>'+fmt(totalPool)+' THB</span></div>';
 h+='</div></div>';

 // Expense categories
 h+='<div class="card"><div class="card-h">Expense Categories</div>';
 var catTotals={};
 for(var i=0;i<monthExp.length;i++){
 var cat=monthExp[i].cat;
 catTotals[cat]=(catTotals[cat]||0)+monthExp[i].amt;
 }
 var maxCat=0;var cats=Object.keys(catTotals);
 for(var i=0;i<cats.length;i++){if(catTotals[cats[i]]>maxCat)maxCat=catTotals[cats[i]]}
 if(cats.length===0){
 h+='<div class="empty" style="padding:12px">No expenses this month</div>';
 }else{
 for(var i=0;i<cats.length;i++){
 var cat=cats[i];
 var pct=maxCat>0?(catTotals[cat]/maxCat*100):0;
 h+='<div style="margin-bottom:8px">';
 h+='<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:2px">';
 h+='<span>'+expCatLabel(cat)+'</span><span style="font-weight:600">'+fmt(catTotals[cat])+' THB</span></div>';
 h+='<div style="height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden">';
 h+='<div style="height:100%;width:'+pct+'%;background:var(--gold);border-radius:4px"></div></div></div>';
 }
 }
 h+='</div>';

 // Expense by villa
 h+='<div class="card"><div class="card-h">By Villa</div>';
 var villaTotals={};
 for(var i=0;i<monthExp.length;i++){
 var v=monthExp[i].villaName||'General';
 villaTotals[v]=(villaTotals[v]||0)+monthExp[i].amt;
 }
 var maxV=0;var villas=Object.keys(villaTotals);
 for(var i=0;i<villas.length;i++){if(villaTotals[villas[i]]>maxV)maxV=villaTotals[villas[i]]}
 if(villas.length===0){
 h+='<div class="empty" style="padding:12px">No data</div>';
 }else{
 for(var i=0;i<villas.length;i++){
 var v=villas[i];
 var pct=maxV>0?(villaTotals[v]/maxV*100):0;
 h+='<div style="margin-bottom:8px">';
 h+='<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:2px">';
 h+='<span>'+v+'</span><span style="font-weight:600">'+fmt(villaTotals[v])+' THB</span></div>';
 h+='<div style="height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden">';
 h+='<div style="height:100%;width:'+pct+'%;background:var(--navy);border-radius:4px"></div></div></div>';
 }
 }
 h+='</div>';

 // Staff expense summary
 h+='<div class="card"><div class="card-h">By Staff</div>';
 var staffTotals={};
 for(var i=0;i<monthExp.length;i++){
 var s=monthExp[i].byName;
 staffTotals[s]=(staffTotals[s]||0)+monthExp[i].amt;
 }
 var maxS=0;var staffs=Object.keys(staffTotals);
 for(var i=0;i<staffs.length;i++){if(staffTotals[staffs[i]]>maxS)maxS=staffTotals[staffs[i]]}
 if(staffs.length===0){
 h+='<div class="empty" style="padding:12px">No data</div>';
 }else{
 for(var i=0;i<staffs.length;i++){
 var s=staffs[i];
 var pct=maxS>0?(staffTotals[s]/maxS*100):0;
 h+='<div style="margin-bottom:8px">';
 h+='<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:2px">';
 h+='<span>'+s+'</span><span style="font-weight:600">'+fmt(staffTotals[s])+' THB</span></div>';
 h+='<div style="height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden">';
 h+='<div style="height:100%;width:'+pct+'%;background:#8b5cf6;border-radius:4px"></div></div></div>';
 }
 }
 h+='</div>';

 c.innerHTML=h;
}
</script>
