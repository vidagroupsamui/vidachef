<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Vida Group Ops</title>
<style>
:root{
  --navy:#0d2744;--navy-l:#163a64;--navy-d:#091b30;
  --gold:#c9a84c;--gold-l:#e0c76e;--gold-dim:rgba(201,168,76,.15);--gold-bdr:rgba(201,168,76,.3);
  --white:#fff;--bg:#f4f1eb;--card:#fff;--text:#1a1a2e;--muted:#6b7280;--text-l:#9ca3af;
  --green:#16a34a;--green-bg:#dcfce7;--red:#dc2626;--red-bg:#fee2e2;--orange:#ea580c;--orange-bg:#fff7ed;--blue:#2563eb;--blue-bg:#dbeafe;
  --r:12px;--r-sm:8px;--r-lg:16px;
  --sh:0 4px 16px rgba(13,39,68,.08);--sh-lg:0 8px 32px rgba(13,39,68,.12);
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  --serif:Georgia,'Times New Roman',serif;
  --tab-h:56px;--top-h:54px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.5;
  -webkit-font-smoothing:antialiased;touch-action:manipulation;overflow:hidden;height:100vh}
button,a{touch-action:manipulation;cursor:pointer;-webkit-tap-highlight-color:transparent}
input,select,textarea{font-family:var(--sans);font-size:16px;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
input[type=number]{-moz-appearance:textfield}input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;
  justify-content:center;z-index:9999;padding:20px}
.login-card{background:var(--white);border-radius:var(--r-lg);padding:36px 28px;max-width:380px;width:100%;box-shadow:var(--sh-lg)}
.login-brand{font-family:var(--serif);font-size:32px;font-weight:700;color:var(--navy);text-align:center}
.login-brand em{color:var(--gold);font-style:italic}
.login-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px;font-weight:300}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.fg input{width:100%;padding:13px 14px;border:2px solid #e5e7eb;border-radius:var(--r-sm);font-size:16px;
  outline:none;transition:border-color .2s}.fg input:focus{border-color:var(--navy)}
.login-btn{width:100%;padding:14px;background:var(--navy);color:var(--gold);border:none;border-radius:var(--r-sm);
  font-size:16px;font-weight:700;letter-spacing:.04em;cursor:pointer;margin-top:8px}
.login-btn:active{background:var(--navy-l)}
.login-err{color:var(--red);font-size:13px;text-align:center;margin-top:10px;display:none}

/* APP SHELL */
#app-shell{display:none;position:fixed;inset:0;background:var(--bg)}

/* TOP BAR */
#topbar{position:fixed;top:0;left:0;right:0;height:var(--top-h);background:var(--navy);
  display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:100;
  border-bottom:2px solid var(--gold)}
.tb-brand{font-family:var(--serif);font-size:18px;font-weight:700;color:#fff;white-space:nowrap}
.tb-brand em{color:var(--gold);font-style:italic}
.tb-title{color:var(--gold);font-size:14px;font-weight:600;letter-spacing:.04em}
.tb-right{display:flex;align-items:center;gap:10px}
.tb-user{font-size:12px;color:rgba(255,255,255,.7)}
.tb-btn{padding:6px 12px;background:transparent;border:1px solid var(--gold-bdr);border-radius:var(--r-sm);
  color:var(--gold);font-size:12px;font-weight:600;cursor:pointer}
.tb-btn:active{background:var(--gold-dim)}

/* CONTENT */
#content{position:fixed;top:var(--top-h);left:0;right:0;bottom:var(--tab-h);overflow-y:auto;
  -webkit-overflow-scrolling:touch;padding:16px}

/* BOTTOM TAB BAR */
#bottom-tabs{position:fixed;bottom:0;left:0;right:0;height:var(--tab-h);background:var(--navy);
  display:flex;align-items:stretch;z-index:100;border-top:1px solid var(--navy-l);
  padding-bottom:env(safe-area-inset-bottom,0)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:transparent;border:none;color:rgba(255,255,255,.45);font-size:9px;font-weight:600;
  letter-spacing:.03em;gap:3px;cursor:pointer;transition:color .15s;min-width:0;overflow:hidden}
.tab-btn .tab-icon{font-size:18px;line-height:1}
.tab-btn.on{color:var(--gold)}

/* MODULE */
.module{display:none}.module.on{display:block}

/* LAYOUT */
.container{max-width:600px;margin:0 auto}
.card{background:var(--card);border-radius:var(--r);padding:18px;margin-bottom:14px;box-shadow:var(--sh);border:1px solid rgba(0,0,0,.04)}
.card-h{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
  margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--gold-bdr)}
.card-h-gold{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);
  margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--gold)}
.note{background:var(--gold-dim);border-left:3px solid var(--gold);border-radius:0 var(--r-sm) var(--r-sm) 0;
  padding:10px 14px;font-size:12px;color:var(--muted);margin-bottom:14px}
.note strong{color:var(--text)}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}
.empty-icon{font-size:40px;margin-bottom:10px;opacity:.3}

/* TABS (module internal) */
.tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-pill{flex-shrink:0;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  padding:8px 14px;border-radius:100px;border:1.5px solid var(--gold-bdr);background:var(--white);
  color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.tab-pill.on{background:var(--navy);color:var(--gold);border-color:var(--navy)}

/* FORMS */
.input,.select,.textarea{width:100%;padding:12px 14px;border:2px solid #e5e7eb;border-radius:var(--r-sm);
  font-size:15px;outline:none;background:var(--white);transition:border-color .2s}
.input:focus,.select:focus,.textarea:focus{border-color:var(--navy)}
.textarea{resize:vertical;min-height:60px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.fg2{margin-bottom:12px}
.fg2 label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px}

/* BUTTONS */
.btn{padding:12px 20px;border:none;border-radius:var(--r-sm);font-size:14px;font-weight:700;
  cursor:pointer;transition:all .15s;text-align:center}
.btn:active{transform:scale(.97)}
.btn-navy{background:var(--navy);color:var(--gold)}
.btn-gold{background:var(--gold);color:var(--navy)}
.btn-outline{background:transparent;border:1.5px solid var(--navy);color:var(--navy)}
.btn-green{background:var(--green);color:#fff}
.btn-red{background:var(--red);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:var(--r-sm)}
.btn-block{width:100%;display:block}

/* COUNTER */
.counter{border:2px solid var(--gold);border-radius:var(--r);overflow:hidden;margin-bottom:12px}
.c-btn{display:block;width:100%;padding:16px;font-size:20px;font-weight:900;border:none;cursor:pointer}
.c-btn.plus{background:var(--navy);color:var(--gold)}
.c-btn.minus{background:var(--bg);color:var(--text)}
.c-mid{background:var(--white);border-top:1px solid var(--gold-bdr);border-bottom:1px solid var(--gold-bdr);
  padding:10px;text-align:center}
.c-label{font-size:10px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
.c-val{font-family:var(--serif);font-size:44px;font-weight:700;color:var(--text);line-height:1}

/* SLIDER */
.sl-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sl-label{font-size:12px;font-weight:600;min-width:80px;color:var(--text)}
.sl-input{width:60px;text-align:center;font-size:13px;font-weight:700}
.sl-range{flex:1;accent-color:var(--gold);height:6px;cursor:pointer}
.sl-pct{font-size:13px;font-weight:700;color:var(--navy);min-width:40px;text-align:right}

/* PRICE */
.price-display{text-align:center;padding:16px;background:var(--navy);border-radius:var(--r);margin-bottom:12px}
.price-display .amount{font-family:var(--serif);font-size:36px;font-weight:700;color:var(--gold)}
.price-display .sub{font-size:12px;color:rgba(255,255,255,.5);margin-top:4px}

/* SUMMARY */
.summary{background:var(--navy-d);border-radius:var(--r-sm);padding:14px;margin-bottom:12px}
.summary-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;color:rgba(255,255,255,.7)}
.summary-row.total{border-top:1px solid rgba(255,255,255,.15);margin-top:6px;padding-top:10px;
  font-size:15px;font-weight:700;color:var(--gold)}

/* BADGES */
.badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700;
  letter-spacing:.03em;text-transform:uppercase}
.b-pending{background:var(--orange-bg);color:var(--orange)}
.b-approved{background:var(--green-bg);color:var(--green)}
.b-rejected{background:var(--red-bg);color:var(--red)}
.b-info{background:var(--blue-bg);color:var(--blue)}

/* EXPENSE ITEM */
.exp-item{display:flex;gap:12px;padding:14px;background:var(--white);border-radius:var(--r-sm);
  margin-bottom:8px;cursor:pointer;border:1px solid rgba(0,0,0,.04);transition:all .15s}
.exp-item:active{background:var(--bg)}
.exp-thumb{width:50px;height:50px;border-radius:var(--r-sm);object-fit:cover;background:var(--bg);flex-shrink:0}
.exp-info{flex:1;min-width:0}
.exp-villa{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp-cat{font-size:12px;color:var(--muted)}
.exp-amt{font-size:15px;font-weight:700;color:var(--navy);white-space:nowrap}

/* SCHEDULE */
.sched-head{display:flex;overflow-x:auto;gap:4px;padding-bottom:8px;scrollbar-width:none;margin-bottom:10px}
.sched-head::-webkit-scrollbar{display:none}
.sched-day{flex-shrink:0;text-align:center;padding:8px 10px;border-radius:var(--r-sm);min-width:48px;
  cursor:pointer;transition:all .15s}
.sched-day.on{background:var(--navy);color:var(--gold)}
.sched-day .dn{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:600}
.sched-day.on .dn{color:rgba(255,255,255,.5)}
.sched-day .dd{font-size:20px;font-weight:700;color:var(--text);line-height:1.2}
.sched-day.on .dd{color:var(--gold)}
.job-card{padding:10px 12px;border-radius:var(--r-sm);margin-bottom:6px;font-size:12px;
  border-left:4px solid;cursor:pointer}
.job-card .jt{font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.05em}
.job-card .jv{color:var(--muted);margin-top:2px}
.job-card .jg{font-weight:600}
.jt-chef-breakfast{background:#fef3c7;border-color:#f59e0b}
.jt-chef-thai{background:#fed7aa;border-color:#f97316}
.jt-chef-bbq{background:#fecaca;border-color:#ef4444}
.jt-chef-custom{background:#e9d5ff;border-color:#a855f7}
.jt-clean-std{background:#dbeafe;border-color:#3b82f6}
.jt-clean-deep{background:#ccfbf1;border-color:#14b8a6}
.jt-clean-move{background:#e0e7ff;border-color:#6366f1}

/* CHART */
.chart-bar-wrap{margin-bottom:16px}
.chart-bar-label{font-size:12px;font-weight:600;margin-bottom:4px;color:var(--text)}
.chart-bar-track{background:#e5e7eb;border-radius:6px;height:24px;position:relative;overflow:hidden;margin-bottom:4px}
.chart-bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:8px;
  font-size:11px;font-weight:700;color:#fff;transition:width .4s ease;min-width:fit-content}
.cbf-rev{background:var(--gold);color:var(--navy)}
.cbf-exp{background:var(--navy)}

/* FILTER BAR */
.filters{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border-radius:100px;border:1.5px solid var(--gold-bdr);background:var(--white);
  color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.filter-btn.on{background:var(--navy);color:var(--gold);border-color:var(--navy)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;
  align-items:flex-end;justify-content:center}
.modal-bg.on{display:flex}
.modal{background:var(--white);border-radius:var(--r-lg) var(--r-lg) 0 0;padding:24px 20px 32px;
  max-width:500px;width:100%;max-height:80vh;overflow-y:auto}
.modal-h{font-family:var(--serif);font-size:22px;font-weight:700;color:var(--navy);margin-bottom:16px}
.modal-x{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;
  background:var(--bg);border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* P&L SUMMARY CARDS */
.pnl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.pnl-card{padding:16px;border-radius:var(--r);text-align:center}
.pnl-card .pv{font-family:var(--serif);font-size:24px;font-weight:700;line-height:1}
.pnl-card .pl{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;margin-top:4px;opacity:.7}
.pc-rev{background:var(--gold-dim);color:var(--navy)}.pc-rev .pv{color:var(--navy)}
.pc-exp{background:var(--navy);color:#fff}.pc-exp .pv{color:var(--gold)}
.pc-prof{background:var(--green-bg);color:var(--green)}.pc-prof .pv{color:var(--green)}
.pc-marg{background:var(--bg);color:var(--muted)}.pc-marg .pv{color:var(--text)}

/* RESPONSIVE */
@media(min-width:768px){
  #content{padding:20px 40px}
  .container{max-width:800px}
  .pnl-grid{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-brand">Vida <em>Group</em></div>
    <div class="login-sub">Operations Dashboard</div>
    <div class="fg">
      <label>Username</label>
      <input type="text" id="login-user" placeholder="Enter username" autocomplete="username">
    </div>
    <div class="fg">
      <label>PIN</label>
      <input type="password" id="login-pin" inputmode="numeric" maxlength="4"
        placeholder="4-digit PIN" autocomplete="current-password">
    </div>
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="login-err">Invalid username or PIN</div>
  </div>
</div>

<!-- APP SHELL -->
<div id="app-shell">
  <!-- TOP BAR -->
  <header id="topbar">
    <div class="tb-brand">Vida <em>Ops</em></div>
    <div class="tb-title" id="tb-title">Chef Calculator</div>
    <div class="tb-right">
      <span class="tb-user" id="tb-user"></span>
      <button class="tb-btn" onclick="doLogout()">Logout</button>
    </div>
  </header>

  <!-- CONTENT -->
  <main id="content">

    <!-- MODULE 1: CHEF CALCULATOR -->
    <div id="mod-chef" class="module">
      <div class="container" id="chef-content"></div>
    </div>

    <!-- MODULE 2: CLEANING CALCULATOR -->
    <div id="mod-cleaning" class="module">
      <div class="container" id="cleaning-content"></div>
    </div>

    <!-- MODULE 3: EXPENSE UPLOAD -->
    <div id="mod-upload" class="module">
      <div class="container" id="upload-content"></div>
    </div>

    <!-- MODULE 5: SCHEDULE -->
    <div id="mod-schedule" class="module">
      <div class="container" id="schedule-content"></div>
    </div>

    <!-- MODULE 6: P&L SUMMARY -->
    <div id="mod-pnl" class="module">
      <div class="container" id="pnl-content"></div>
    </div>

  </main>

  <!-- BOTTOM TAB BAR -->
  <nav id="bottom-tabs">
    <button class="tab-btn" data-mod="chef" onclick="showMod('chef')">
      <span class="tab-icon">&#127859;</span><span>Chef</span>
    </button>
    <button class="tab-btn" data-mod="cleaning" onclick="showMod('cleaning')">
      <span class="tab-icon">&#129696;</span><span>Cleaning</span>
    </button>
    <button class="tab-btn" data-mod="upload" onclick="showMod('upload')">
      <span class="tab-icon">&#128203;</span><span>Expenses</span>
    </button>
    <button class="tab-btn" data-mod="schedule" onclick="showMod('schedule')">
      <span class="tab-icon">&#128197;</span><span>Schedule</span>
    </button>
    <button class="tab-btn" data-mod="pnl" onclick="showMod('pnl')">
      <span class="tab-icon">&#128200;</span><span>P&L</span>
    </button>
    <button class="tab-btn" data-mod="pool" onclick="return false" style="opacity:.3;pointer-events:none">
      <span class="tab-icon">&#127946;</span><span>Pool</span>
    </button>
  </nav>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal" style="position:relative" id="modal-body"></div>
</div>

// ==================== CHEF CALCULATOR ====================
function chefGetPrice(service,guests){
  if(service==='breakfast'){
    var b=CHEF_PRICING.breakfast.find(function(x){return x.g===guests});
    return b?b.price:0;
  }
  if(service==='floating'){
    return CHEF_PRICING.floating.fixedPrice;
  }
  if(service==='thai'){
    var t=CHEF_PRICING.thai.find(function(x){return guests>=x.min&&guests<=x.max});
    return t?t.price:0;
  }
  if(service==='bbq'){
    var q=CHEF_PRICING.bbq.find(function(x){return guests>=x.min&&guests<=x.max});
    return q?q.fee:0;
  }
  return 0;
}
function chefGetDefaultShares(tab){
  var g=chefState.services[tab]?chefState.services[tab].guests:2;
  var laborPct;
  if(tab==='breakfast'){
    if(g<=3)laborPct=30;else if(g<=6)laborPct=35;else if(g<=10)laborPct=38;else laborPct=42;
    return{labor:laborPct,ingredients:28,commission:5,profit:27,buffer:100-laborPct-28-5-27};
  }
  if(tab==='floating'){
    return{labor:30,ingredients:28,commission:5,profit:27,buffer:10};
  }
  if(tab==='thai'){
    if(g<=3)laborPct=30;else if(g<=6)laborPct=35;else if(g<=9)laborPct=38;else laborPct=42;
    return{labor:laborPct,ingredients:33,commission:5,profit:17,buffer:100-laborPct-33-5-17};
  }
  if(tab==='bbq'){
    if(g<=3)laborPct=30;else if(g<=6)laborPct=35;else if(g<=9)laborPct=38;else laborPct=42;
    return{labor:laborPct,ingredients:0,commission:5,profit:40,buffer:100-laborPct-0-5-40};
  }
  return{labor:30,ingredients:20,commission:20,profit:15,buffer:15};
}
function chefInitServices(){
  var saved=ld('chef_calcs');
  var svcs=['breakfast','floating','thai','bbq','custom'];
  if(saved){chefState.saved=saved}
  for(var i=0;i<svcs.length;i++){
    if(!chefState.services[svcs[i]]){
      var s=(chefState.saved&&chefState.saved[svcs[i]])||{};
      var def=chefGetDefaultShares(svcs[i]);
      chefState.services[svcs[i]]={
        guests:s.guests||(svcs[i]==='breakfast'?2:svcs[i]==='thai'?4:svcs[i]==='bbq'?4:2),
        ingredientCost:s.ingredientCost||0,
        manualPrice:s.manualPrice||0,
        shares:s.shares||{0:def.labor,1:def.ingredients,2:def.commission,3:def.profit,4:def.buffer}
      };
    }
  }
}

function chefGuests(d){
  var s=chefState.services[chefState.tab];
  if(chefState.tab==='breakfast'){s.guests=Math.max(1,Math.min(16,s.guests+d))}
  else if(chefState.tab==='thai'){var ranges=[3,6,9,12,15];var idx=ranges.indexOf(s.guests);idx=Math.max(0,Math.min(4,idx+d));s.guests=ranges[idx]}
  else if(chefState.tab==='bbq'){var ranges=[3,6,9,12];var idx=ranges.indexOf(s.guests);idx=Math.max(0,Math.min(3,idx+d));s.guests=ranges[idx]}
  renderChefPanel();
}
function chefSetGuests(v){var s=chefState.services[chefState.tab];s.guests=Math.max(1,parseInt(v)||2);renderChefPanel()}
function chefSetManual(v){var s=chefState.services[chefState.tab];s.manualPrice=Math.max(0,parseInt(v)||0);renderChefPanel()}
function chefSetCost(v){var s=chefState.services[chefState.tab];s.ingredientCost=Math.max(0,parseInt(v)||0);renderChefPanel()}
function chefSlider(idx,val){
  var s=chefState.services[chefState.tab];val=parseInt(val);
  s.shares[idx]=val;
  var others=[];for(var i=0;i<5;i++){if(i!==idx)others.push(i)}
  var othersSum=0;for(var i=0;i<others.length;i++){othersSum+=(s.shares[others[i]]||0)}
  var remaining=100-val;
  if(othersSum===0){var each=Math.floor(remaining/others.length);for(var i=0;i<others.length;i++){s.shares[others[i]]=each}}
  else{for(var i=0;i<others.length;i++){s.shares[others[i]]=Math.round(remaining*(s.shares[others[i]]||0)/othersSum)}}
  renderChefPanel();
}

}

  var isStaff=CUR.role==='staff';
  var isManager=CUR.role==='manager';
  var isDirector=CUR.role==='director';
  var h='';
  // Staff: show submission form
  if(isStaff){
    h+='<div class="card"><div class="card-h-gold">New Expense</div>';
    h+='<div class="fg2"><label>Photo</label>';
    h+='<input type="file" accept="image/*" capture="environment" id="exp-photo" onchange="uploadPhoto(this)" style="font-size:13px">';
    h+='<div id="exp-preview" style="margin-top:8px"></div></div>';
    h+='<div class="fg2"><label>Villa</label><select class="select" id="exp-villa">';
    h+='<option value="">Select villa...</option>';
    for(var i=0;i<VILLAS.length;i++){h+='<option value="'+VILLAS[i].id+'">'+VILLAS[i].name+'</option>'}
    h+='<option value="general">General / Office</option>';
    h+='</select></div>';
    h+='<div class="fg2"><label>Category</label><select class="select" id="exp-cat">';
    h+='<option>Transport</option><option>Supplies</option><option>Food</option><option>Equipment</option><option>Other</option>';
    h+='</select></div>';
    h+='<div class="fg2"><label>Amount (THB)</label><input class="input" type="number" id="exp-amt" min="0" placeholder="0"></div>';
    h+='<div class="fg2"><label>Notes</label><textarea class="textarea" id="exp-notes" placeholder="Brief description..."></textarea></div>';
    h+='<button class="btn btn-navy btn-block" onclick="uploadSubmit()">Submit Expense</button></div>';
  }
  // Director/Manager: show review with filters
  if(isDirector||isManager){
    var expenses=ld('expenses')||[];
    var filtered=expenses;
    if(expFilter!=='all'){filtered=expenses.filter(function(e){return e.status===expFilter})}
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">';
    h+='<div class="filters">';
    var filters=['all','pending','approved','rejected'];
    var fLabels=['All','Pending','Approved','Rejected'];
    for(var i=0;i<filters.length;i++){h+='<button class="filter-btn'+(expFilter===filters[i]?' on':'')+'" onclick="expSetFilter(\''+filters[i]+'\')">'+fLabels[i]+'</button>'}
    h+='</div>';
    h+='<button class="btn btn-sm btn-outline" onclick="expExport()">Export CSV</button></div>';
    if(filtered.length===0){h+='<div class="empty"><div class="empty-icon">&#128203;</div><div>No expenses</div></div>'}
    else{
      for(var i=0;i<filtered.length;i++){var e=filtered[i];
        h+='<div class="exp-item" onclick="expReview(\''+e.id+'\')">';
        if(e.photo)h+='<img class="exp-thumb" src="'+e.photo+'">';
        else h+='<div class="exp-thumb" style="display:flex;align-items:center;justify-content:center;font-size:20px">&#128247;</div>';
        h+='<div class="exp-info"><div class="exp-villa">'+e.villaName+'</div>';
        h+='<div class="exp-cat">'+e.cat+' &middot; by '+e.byName+'</div></div>';
        h+='<div class="exp-amt">'+fmt(e.amt)+'</div>';
        h+='<div><span class="badge b-'+e.status+'">'+e.status+'</span></div></div>';
      }
    }
  }
  // All roles: show own expenses list
  h+='<div class="card"><div class="card-h-gold">'+(isStaff?'My Expenses':'All Expenses')+'</div>';
  var expenses=ld('expenses')||[];
  var list=isStaff?expenses.filter(function(e){return e.by===CUR.u}):expenses;
  list=list.reverse().slice(0,20);
  if(list.length===0){h+='<div class="empty"><div class="empty-icon">&#128203;</div><div>No expenses yet</div></div>'}
  else{for(var i=0;i<list.length;i++){var e=list[i];
    h+='<div class="exp-item" onclick="'+(isStaff?'uploadDetail':'expReview')+'(\''+e.id+'\')">';
    if(e.photo)h+='<img class="exp-thumb" src="'+e.photo+'">';
    else h+='<div class="exp-thumb" style="display:flex;align-items:center;justify-content:center;font-size:20px">&#128247;</div>';
    h+='<div class="exp-info"><div class="exp-villa">'+e.villaName+'</div>';
    h+='<div class="exp-cat">'+e.cat+' &middot; '+fmtDate(e.at)+'</div></div>';
    h+='<div class="exp-amt">'+fmt(e.amt)+'</div>';
    h+='<div><span class="badge b-'+e.status+'">'+e.status+'</span></div></div>';
  }}
  h+='</div>';
  c.innerHTML=h;
}
function uploadPhoto(input){
  if(!input.files||!input.files[0])return;
  var file=input.files[0];
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement('canvas');
      var MAX=800;var w=img.width,h=img.height;
      if(w>MAX){h=h*MAX/w;w=MAX}if(h>MAX){w=w*MAX/h;h=MAX}
      canvas.width=w;canvas.height=h;
      var ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,w,h);
      uploadPhotoData=canvas.toDataURL('image/jpeg',0.7);
      document.getElementById('exp-preview').innerHTML='<img class="exp-thumb" src="'+uploadPhotoData+'" style="width:100%;max-width:300px;height:auto">';
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function uploadSubmit(){
  var villa=document.getElementById('exp-villa').value;
  var cat=document.getElementById('exp-cat').value;
  var amt=parseInt(document.getElementById('exp-amt').value)||0;
  var notes=document.getElementById('exp-notes').value.trim();
  if(!villa){alert('Select a villa');return}
  if(amt<=0){alert('Enter a valid amount');return}
  var villaObj=VILLAS.find(function(v){return v.id===villa});
  var villaName=villaObj?villaObj.name:(villa==='general'?'General / Office':villa);
  var expenses=ld('expenses')||[];
  expenses.push({id:gid('exp'),photo:uploadPhotoData||'',villa:villa,villaName:villaName,
    cat:cat,amt:amt,notes:notes,status:'pending',by:CUR.u,byName:CUR.name,at:new Date().toISOString(),
    reviewedBy:'',reviewedAt:'',reviewNotes:''});
  sv('expenses',expenses);
  uploadPhotoData=null;
  renderUpload();
}

function expApprove(id){
  var expenses=ld('expenses')||[];
  var e=expenses.find(function(x){return x.id===id});
  if(!e)return;
  e.status='approved';e.reviewedBy=CUR.name;e.reviewedAt=new Date().toISOString();
  var notes=document.getElementById('exp-review-notes');
  if(notes)e.reviewNotes=notes.value;
  sv('expenses',expenses);closeModal();renderUpload();
}
function expReject(id){
  var expenses=ld('expenses')||[];
  var e=expenses.find(function(x){return x.id===id});
  if(!e)return;
  e.status='rejected';e.reviewedBy=CUR.name;e.reviewedAt=new Date().toISOString();
  var notes=document.getElementById('exp-review-notes');
  if(notes)e.reviewNotes=notes.value;
  sv('expenses',expenses);closeModal();renderUpload();
}
function expExport(){
  var expenses=ld('expenses')||[];
  if(expenses.length===0){alert('No data to export');return}
  var csv='ID,Date,Villa,Category,Amount,Submitter,Status,Notes\n';
  for(var i=0;i<expenses.length;i++){
    var e=expenses[i];
    csv+=e.id+','+e.at+','+e.villaName.replace(/,/g,'')+','+e.cat+','+e.amt+','+e.byName.replace(/,/g,'')+','+e.status+','+(e.notes||'').replace(/,/g,'')+'\n';
  }
  var blob=new Blob([csv],{type:'text/csv'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='vida_expenses_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

// ==================== SCHEDULE ====================
function schedGetTypeColor(title){
  var t=title.toLowerCase();
  if(t.indexOf('checkout')!==-1||t.indexOf('check out')!==-1)return'jt-clean-std';
  if(t.indexOf('staying')!==-1||t.indexOf('stayover')!==-1)return'jt-clean-deep';
  if(t.indexOf('breakfast')!==-1||t.indexOf('dinner')!==-1||t.indexOf('bbq')!==-1||t.indexOf('chef')!==-1)return'jt-chef-bbq';
  if(t.indexOf('deep clean')!==-1)return'jt-chef-custom';
  if(t.indexOf('pool')!==-1)return'jt-clean-move';
  return'';
}
function schedFetchCal(){
  calLoading=true;
  var now=new Date();
  var later=new Date();later.setDate(later.getDate()+30);
  var url='https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(CAL_ID)+'/events?key='+CAL_API_KEY
    +'&timeMin='+now.toISOString()+'&timeMax='+later.toISOString()
    +'&singleEvents=true&orderBy=startTime';
  console.log('[CAL] Fetching:',url);
  console.log('[CAL] CAL_ID:',CAL_ID);
  console.log('[CAL] API_KEY:',CAL_API_KEY);
  fetch(url,{headers:{'Accept':'application/json'}}).then(function(r){
    console.log('[CAL] Response status:',r.status,r.statusText);
    if(!r.ok){
      return r.text().then(function(txt){
        console.error('[CAL] Error body:',txt);
        throw new Error('API '+r.status+': '+r.statusText+' — '+txt.substring(0,200));
      });
    }
    return r.json();
  }).then(function(data){
    if(data.error){
      console.error('[CAL] API error:',JSON.stringify(data.error));
      throw new Error('API error: '+(data.error.message||'unknown'));
    }
    calLoading=false;calOnline=true;
    calEvents=(data.items||[]).map(function(ev){
      var start=ev.start.dateTime||ev.start.date;
      var end=ev.end.dateTime||ev.end.date;
      var sDate=start.split('T')[0];
      var sTime=start.indexOf('T')!==-1?start.split('T')[1].substring(0,5):'';
      var eTime=end&&end.indexOf('T')!==-1?end.split('T')[1].substring(0,5):'';
      return{title:ev.summary||'Untitled',date:sDate,time:sTime,endTime:eTime,desc:ev.description||'',color:schedGetTypeColor(ev.summary||'')};
    });
    sv('cal_events',calEvents);
    renderSchedule();
  }).catch(function(e){
    console.error('[CAL] Fetch failed:',e.message);
    calLoading=false;calOnline=false;
    calEvents=ld('cal_events')||[];
    renderSchedule();
  });
}
function schedRefresh(){
  calEvents=[];
  schedFetchCal();
}
function renderSchedule(){
  var c=document.getElementById('schedule-content');
  var jobs=ld('schedule')||[];
  var allJobs=calEvents.length>0?calEvents:jobs;
  var days=[];
  for(var i=0;i<14;i++){var d=new Date(schedViewDate);d.setDate(d.getDate()+i);days.push(d)}
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
  h+='<button class="btn btn-sm btn-outline" onclick="schedNav(-1)">&larr;</button>';
  h+='<span style="font-size:13px;font-weight:600">'+days[0].toLocaleDateString('en',{month:'short',day:'numeric'})+' &ndash; '+days[13].toLocaleDateString('en',{month:'short',day:'numeric',year:'numeric'})+'</span>';
  h+='<button class="btn btn-sm btn-outline" onclick="schedNav(1)">&rarr;</button>';
  if(CUR.role==='director'){
    h+='<button class="btn btn-sm btn-green" onclick="schedRefresh()" style="margin-left:6px">&#8635; Refresh</button>';
  }
  h+='</div>';
  // Status badge
  if(calLoading){
    h+='<div style="text-align:center;padding:8px;font-size:12px;color:var(--muted)">&#8987; Loading calendar...</div>';
  }else if(calOnline){
    h+='<div style="text-align:center;padding:4px"><span class="badge b-approved">Live</span></div>';
  }else{
    h+='<div style="text-align:center;padding:4px"><span class="badge b-pending">Offline</span></div>';
  }
  h+='<div class="sched-head">';
  var dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  for(var i=0;i<days.length;i++){
    var d=days[i];var isToday=d.toDateString()===new Date().toDateString();
    var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    h+='<div class="sched-day'+(schedSelDay===ds?' on':'')+'" onclick="schedSelDay=\''+ds+'\';renderSchedule()">';
    h+='<div class="dn">'+dayNames[d.getDay()]+'</div><div class="dd">'+d.getDate()+'</div></div>';
  }
  h+='</div>';
  if(schedSelDay){
    var dayJobs=allJobs.filter(function(j){return j.date===schedSelDay}).sort(function(a,b){return(a.time||'').localeCompare(b.time||'')});
    if(dayJobs.length===0){h+='<div class="empty"><div class="empty-icon">&#128197;</div><div>No jobs scheduled</div></div>'}
    else{for(var i=0;i<dayJobs.length;i++){var j=dayJobs[i];
      var cls=j.color||'';
      h+='<div class="job-card '+cls+'" onclick="schedDetail('+i+')">';
      h+='<div class="jt">'+(j.title||j.type||'').replace('-',' ')+'</div>';
      var timeStr='';
      if(j.time){timeStr=j.time;if(j.endTime)timeStr+=' - '+j.endTime}
      h+='<div class="jv">'+(j.villaName||j.desc||'')+(timeStr?' &middot; '+timeStr:'')+'</div>';
      if(j.guests)h+='<div class="jg">'+j.guests+' guests</div>';
      h+='</div>';
    }}
  }else{
    h+='<div class="empty"><div class="empty-icon">&#128197;</div><div>Select a day to view jobs</div></div>';
  }
  if(canEdit('schedule')){
    h+='<button class="btn btn-navy btn-block" style="margin-top:12px" onclick="schedAdd()">+ Add Job</button>';
  }
  c.innerHTML=h;
}

function schedSave(){
  var date=document.getElementById('sj-date').value;
  var time=document.getElementById('sj-time').value;
  var type=document.getElementById('sj-type').value;
  var villa=document.getElementById('sj-villa').value;
  var guests=parseInt(document.getElementById('sj-guests').value)||0;
  var notes=document.getElementById('sj-notes').value.trim();
  if(!date||!type||!villa){alert('Fill in required fields');return}
  var villaObj=VILLAS.find(function(v){return v.id===villa});
  var jobs=ld('schedule')||[];
  jobs.push({id:gid('job'),date:date,time:time,type:type,villa:villa,villaName:villaObj?villaObj.name:'',
    guests:guests,notes:notes,status:'confirmed',createdBy:CUR.u,createdByName:CUR.name,createdAt:new Date().toISOString(),
    title:type.replace('-',' '),color:schedGetTypeColor(type)});
  sv('schedule',jobs);closeModal();schedSelDay=date;renderSchedule();
}
function schedDelete(id){
  if(!confirm('Delete this job?'))return;
  var jobs=ld('schedule')||[];
  jobs=jobs.filter(function(j){return j.id!==id});
  sv('schedule',jobs);closeModal();renderSchedule();
}

function renderPnl(){

  var c=document.getElementById('pnl-content');

  h+='<button class="btn btn-sm btn-outline" onclick="pnlNav(-1)">&larr;</button>';

  h+='<button class="btn btn-sm btn-outline" onclick="pnlNav(1)">&rarr;</button></div>';
  var data=pnlCalc();
  h+='<div class="pnl-grid">';
  h+='<div class="pnl-card pc-rev"><div class="pv">'+fmt(data.revenue)+'</div><div class="pl">Revenue</div></div>';
  h+='<div class="pnl-card pc-exp"><div class="pv">'+fmt(data.expenses)+'</div><div class="pl">Expenses</div></div>';
  h+='<div class="pnl-card pc-prof"><div class="pv">'+fmt(data.profit)+'</div><div class="pl">Profit</div></div>';
  h+='<div class="pnl-card pc-marg"><div class="pv">'+data.margin+'%</div><div class="pl">Margin</div></div>';
  h+='</div>';
  if(data.weeks.length>0){
    h+='<div class="card"><div class="card-h-gold">Weekly Breakdown</div>';
    for(var i=0;i<data.weeks.length;i++){
      var w=data.weeks[i];
      var maxVal=Math.max(data.weeks[0].rev,data.weeks[0].exp,1);
      for(var j=0;j<data.weeks.length;j++){maxVal=Math.max(maxVal,data.weeks[j].rev,data.weeks[j].exp,1)}
      h+='<div class="chart-bar-wrap"><div class="chart-bar-label">'+w.label+'</div>';
      h+='<div class="chart-bar-track"><div class="chart-bar-fill cbf-rev" style="width:'+Math.max(8,w.rev/maxVal*100)+'%">'+fmt(w.rev)+'</div></div>';
      h+='<div class="chart-bar-track"><div class="chart-bar-fill cbf-exp" style="width:'+Math.max(8,w.exp/maxVal*100)+'%">'+fmt(w.exp)+'</div></div>';
      h+='</div>';
    }
    h+='</div>';
  }
  if(Object.keys(data.byCat).length>0){
    h+='<div class="card"><div class="card-h-gold">Expense by Category</div>';
    var maxCat=0;for(var k in data.byCat){maxCat=Math.max(maxCat,data.byCat[k])}
    for(var k in data.byCat){
      h+='<div class="chart-bar-wrap"><div class="chart-bar-label">'+k+'</div>';
      h+='<div class="chart-bar-track"><div class="chart-bar-fill cbf-exp" style="width:'+Math.max(8,data.byCat[k]/maxCat*100)+'%">'+fmt(data.byCat[k])+'</div></div></div>';
    }
    h+='</div>';
  }
  h+='<div class="card"><div class="card-h-gold">Recent Transactions</div>';
  var expenses=ld('expenses')||[];
  var monthExp=expenses.filter(function(e){var d=new Date(e.at);return d.getFullYear()===pnlYear&&d.getMonth()===pnlMonth});
  if(monthExp.length===0){h+='<div class="empty">No transactions this month</div>'}
  else{
    var shown=monthExp.reverse().slice(0,10);
    for(var i=0;i<shown.length;i++){var e=shown[i];
      h+='<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px">';
      h+='<span>'+e.villaName+' &middot; '+e.cat+'</span>';
      h+='<span style="font-weight:700">'+fmt(e.amt)+' <span class="badge b-'+e.status+'" style="font-size:9px">'+e.status+'</span></span></div>';
    }
  }
  h+='</div>';
  c.innerHTML=h;
}
function pnlNav(d){pnlMonth+=d;if(pnlMonth>11){pnlMonth=0;pnlYear++}if(pnlMonth<0){pnlMonth=11;pnlYear--}renderPnl()}
function pnlCalc(){
  var expenses=ld('expenses')||[];
  var chefCalcs=ld('chef_calcs')||{};
  var cleanCalcs=ld('clean_calcs')||{};
  var revenue=0,expenseTotal=0;
  var weeks=[{label:'Week 1',rev:0,exp:0},{label:'Week 2',rev:0,exp:0},{label:'Week 3',rev:0,exp:0},{label:'Week 4',rev:0,exp:0}];
  var byCat={};
  var monthExp=expenses.filter(function(e){var d=new Date(e.at);return d.getFullYear()===pnlYear&&d.getMonth()===pnlMonth});
  for(var i=0;i<monthExp.length;i++){
    var e=monthExp[i];expenseTotal+=e.amt;
    if(!byCat[e.cat])byCat[e.cat]=0;byCat[e.cat]+=e.amt;
    var day=new Date(e.at).getDate();var wi=Math.min(3,Math.floor((day-1)/7));
    weeks[wi].exp+=e.amt;
  }
  for(var svc in chefCalcs){
    var s=chefCalcs[svc];
    var price=chefGetPrice(svc,s.guests);
    revenue+=price;
    var day=new Date().getDate();var wi=Math.min(3,Math.floor((day-1)/7));
    weeks[wi].rev+=price;
  }
  for(var vid in cleanCalcs){
    var villa=VILLAS.find(function(v){return v.id===vid});
    if(villa){revenue+=villa.co}
  }
  var profit=revenue-expenseTotal;
  var margin=revenue>0?Math.round(profit/revenue*100):0;
  return{revenue:revenue,expenses:expenseTotal,profit:profit,margin:margin,weeks:weeks,byCat:byCat};
}
